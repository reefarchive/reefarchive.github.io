project:
  type: website
  output-dir: _site

website:
  title: "The Reef Archive"
  description: "An archive of historical coral reef photography"
  
  navbar:
    background: "#0D1B2A"
    foreground: "#F7F4EE"
    logo-alt: "The Reef Archive"
    left:
      - text: "Archive"
        href: gallery/index.qmd
      - text: "Map"
        href: map/index.qmd
      - text: "About"
        href: about/index.qmd
    right:
      - icon: github
        href: https://github.com/reefarchive/reefarchive.github.io
        aria-label: GitHub

  page-footer:
    background: "#0D1B2A"
    foreground: "#C8B89A"
    left: |
      The Reef Archive — A living record of historical coral reef photography
    right: |
      Built with [Quarto](https://quarto.org) · Images via [Internet Archive](https://archive.org)

format:
  html:
    theme:
      - cosmo
      - styles/custom.scss
    css: styles/custom.css
    toc: false
    smooth-scroll: true
    link-external-newwindow: true
