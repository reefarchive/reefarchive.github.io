project:
  type: website
  output-dir: _site

resources:
  - _img/*

website:
  title: "The Reef Archive"
  description: "An archive of historical coral reef photography"
  repo-url: https://github.com/reefarchive/reefarchive.github.io
  site-url: https://reefarchive.org
  favicon: _img/favicon.png
  open-graph:
    title: The Reef Archive
    description: An archive of historical coral reef photography
    image: _img/hero.jpg
    locale: en_GB
  
  navbar:
    pinned: true
    background: "#0D1B2A"
    foreground: "#F7F4EE"
    favicon: _img/favicon.png
    search: false
    right:
      - text: "Collections"
        href: collections/index.qmd
      - text: "Atlas"
        href: atlas/index.qmd
      - text: "About"
        href: about/index.qmd
      - icon: envelope-fill
        href: mailto:info@reefarchive.org
        aria-label: Contact
      - icon: github
        href: https://github.com/reefarchive/reefarchive.github.io
        aria-label: GitHub

  page-footer:
    background: "#0D1B2A"
    foreground: "#C8B89A"
    left: |
      A living record of historical coral reef photography
    center: |
      [Contact us](mailto:info@reefarchive.org)
    right: |
      [Built with Quarto](https://quarto.org) · [Images Archived via Internet Archive](https://archive.org/details/@reef_archive/uploads)

format:
  html:
    theme:
      - cosmo
      - styles/custom.scss
    css: styles/custom.css
    toc: false
    smooth-scroll: true
    link-external-newwindow: false
