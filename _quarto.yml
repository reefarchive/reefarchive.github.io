project:
  type: website
  output-dir: _site

resources:
  - resources/*

website:
  title: "Reef Archive"
  description: "An archive of historical coral reef photography"
  
  navbar:
    background: "#0D1B2A"
    foreground: "#F7F4EE"
    logo-alt: "Reef Archive"
    search: false
    right:
      - text: "Collections"
        href: collections/index.qmd
      - text: "Atlas"
        href: atlas/index.qmd
      - text: "About"
        href: about/index.qmd
      - icon: envelope-fill
        href: mailto:info@reefarchive.org
        aria-label: Contact
      - icon: github
        href: https://github.com/reefarchive/reefarchive.github.io
        aria-label: GitHub

  page-footer:
    background: "#0D1B2A"
    foreground: "#C8B89A"
    left: |
      A living record of historical coral reef photography
    right: |
      Built with [Quarto](https://quarto.org) · Images Archived via [Internet Archive](https://archive.org)

format:
  html:
    theme:
      - cosmo
      - styles/custom.scss
    css: styles/custom.css
    toc: false
    smooth-scroll: true
    link-external-newwindow: true
