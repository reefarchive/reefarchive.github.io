on:
  workflow_dispatch:
  push:
    branches: main
  schedule:
    # Every day at 8am
    - cron: "0 8 * * *"

name: Deploy to Github Pages

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up R
        uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      # List generated with pak::pkg_sysreqs("mapgl")
      - name: Install required dependencies for mapgl
        run: sudo apt install cmake make libuv1-dev zlib1g-dev pandoc libabsl-dev libssl-dev libgdal-dev libgeos-dev libproj-dev libsqlite3-dev libudunits2-dev

      - name: Install R dependencies
        run: install.packages(c("dplyr", "here", "mapgl", "readr", "sf"))
        shell: Rscript {0}

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Render and Publish
        uses: quarto-dev/quarto-actions/publish@v2
        with:
          target: gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
